
services:
  jaeger:
    container_name: jaeger
    image: jaegertracing/all-in-one:1.62.0
    ports:
      - '16686:16686'
      - '4317:4317'
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:16686/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  n0:
    build:
      context: ../..
      dockerfile: examples/phinode/Dockerfile
    environment:
      NODE_ID: n0
      BIND_ADDR: "0.0.0.0:7946"
      CRDT_BIND_ADDR: "0.0.0.0:7947"
      STORE_PATH: "/data/n0.db"
      HEARTBEAT_INTERVAL: "1s"
      PHI_HIGH_THRESHOLD: "8.0"
      PHI_LOW_THRESHOLD: "1.0"
      WINDOW_SIZE: "1000"
      MIN_STDDEV: "100ms"
      SUSPECT_DWELL: "2s"
      REAP_DWELL: "30s"
      EVENT_INTERVAL: "5s"
      DECREMENT_PROBABILITY: "0.5"
      GOSSIP_INTERVAL: "1s"
      GC_INTERVAL: "10s"
      OTLP_ENDPOINT: "jaeger:4317"
    volumes:
      - n0-data:/data
    depends_on:
      jaeger:
        condition: service_healthy

  n1:
    build:
      context: ../..
      dockerfile: examples/phinode/Dockerfile
    environment:
      NODE_ID: n1
      BIND_ADDR: "0.0.0.0:7946"
      CRDT_BIND_ADDR: "0.0.0.0:7947"
      STORE_PATH: "/data/n1.db"
      PEERS: "n0:7946"
      HEARTBEAT_INTERVAL: "1s"
      PHI_HIGH_THRESHOLD: "8.0"
      PHI_LOW_THRESHOLD: "1.0"
      WINDOW_SIZE: "1000"
      MIN_STDDEV: "100ms"
      SUSPECT_DWELL: "2s"
      REAP_DWELL: "30s"
      EVENT_INTERVAL: "5s"
      DECREMENT_PROBABILITY: "0.5"
      GOSSIP_INTERVAL: "1s"
      GC_INTERVAL: "10s"
      OTLP_ENDPOINT: "jaeger:4317"
    volumes:
      - n1-data:/data
    depends_on:
      n0:
        condition: service_started
      jaeger:
        condition: service_healthy

  n2:
    build:
      context: ../..
      dockerfile: examples/phinode/Dockerfile
    environment:
      NODE_ID: n2
      BIND_ADDR: "0.0.0.0:7946"
      CRDT_BIND_ADDR: "0.0.0.0:7947"
      STORE_PATH: "/data/n2.db"
      # full mesh: n2 seeds both n0 and n1 so every pair is introduced. phi
      # does not disseminate membership, so a star seed (n0 only) would leave
      # n1 and n2 never learning each other.
      PEERS: "n0:7946,n1:7946"
      HEARTBEAT_INTERVAL: "1s"
      PHI_HIGH_THRESHOLD: "8.0"
      PHI_LOW_THRESHOLD: "1.0"
      WINDOW_SIZE: "1000"
      MIN_STDDEV: "100ms"
      SUSPECT_DWELL: "2s"
      REAP_DWELL: "30s"
      EVENT_INTERVAL: "5s"
      DECREMENT_PROBABILITY: "0.5"
      GOSSIP_INTERVAL: "1s"
      GC_INTERVAL: "10s"
      OTLP_ENDPOINT: "jaeger:4317"
    volumes:
      - n2-data:/data
    depends_on:
      n0:
        condition: service_started
      n1:
        condition: service_started
      jaeger:
        condition: service_healthy

volumes:
  n0-data:
  n1-data:
  n2-data:
