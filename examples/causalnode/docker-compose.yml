
services:
  jaeger:
    container_name: jaeger
    image: jaegertracing/all-in-one:1.62.0
    ports:
      - '16686:16686'
      - '4317:4317'
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:16686/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  n0:
    build:
      context: ../..
      dockerfile: examples/causalnode/Dockerfile
    environment:
      NODE_ID: n0
      BIND_ADDR: "0.0.0.0:7946"
      CRDT_BIND_ADDR: "0.0.0.0:7947"
      STORE_PATH: "/data/n0.db"
      PROBE_INTERVAL: "5s"
      PROBE_TIMEOUT: "1s"
      SUSPICION_MULT: "8"
      EVENTS_INTERVAL: '5s'
      REMOVE_PROBABILITY: "0.3"
      WORKLOAD_POOL_SIZE: "8"
      GOSSIP_INTERVAL: "1s"
      GC_INTERVAL: "10s"
      OTLP_ENDPOINT: "jaeger:4317"
    volumes:
      - n0-data:/data
    depends_on:
      jaeger:
        condition: service_healthy

  n1:
    build:
      context: ../..
      dockerfile: examples/causalnode/Dockerfile
    environment:
      NODE_ID: n1
      BIND_ADDR: "0.0.0.0:7946"
      CRDT_BIND_ADDR: "0.0.0.0:7947"
      STORE_PATH: "/data/n1.db"
      PEERS: "n0:7946"
      PROBE_INTERVAL: "5s"
      PROBE_TIMEOUT: "1s"
      SUSPICION_MULT: "8"
      EVENTS_INTERVAL: '5s'
      REMOVE_PROBABILITY: "0.3"
      WORKLOAD_POOL_SIZE: "8"
      GOSSIP_INTERVAL: "1s"
      GC_INTERVAL: "10s"
      OTLP_ENDPOINT: "jaeger:4317"
    volumes:
      - n1-data:/data
    depends_on:
      n0:
        condition: service_started
      jaeger:
        condition: service_healthy

  n2:
    build:
      context: ../..
      dockerfile: examples/causalnode/Dockerfile
    environment:
      NODE_ID: n2
      BIND_ADDR: "0.0.0.0:7946"
      CRDT_BIND_ADDR: "0.0.0.0:7947"
      STORE_PATH: "/data/n2.db"
      PEERS: "n0:7946"
      PROBE_INTERVAL: "5s"
      PROBE_TIMEOUT: "1s"
      SUSPICION_MULT: "8"
      EVENTS_INTERVAL: '5s'
      REMOVE_PROBABILITY: "0.3"
      WORKLOAD_POOL_SIZE: "8"
      GOSSIP_INTERVAL: "1s"
      GC_INTERVAL: "10s"
      OTLP_ENDPOINT: "jaeger:4317"
    volumes:
      - n2-data:/data
    depends_on:
      n0:
        condition: service_started
      jaeger:
        condition: service_healthy

volumes:
  n0-data:
  n1-data:
  n2-data: